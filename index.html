<!DOCTYPE html>
<html>
<head>
<title>Royal Enfield CRM - Offline Ready</title>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body {
  margin:0;
  padding:20px;
  font-family: 'Segoe UI', sans-serif;
  background: linear-gradient(135deg, rgba(15,15,15,0.35), rgba(28,28,28,0.35), rgba(43,43,43,0.35)), url('himalayan-bg.jpg') center/cover fixed;
  background-attachment: fixed;
  min-height: 100vh;
  position: relative;
}


* {
  position: relative;
  z-index: 1;
}

.box {
  max-width:500px;
  margin:40px auto;
  padding:25px;
  background: rgba(255,255,255,0.04);
  backdrop-filter: blur(8px);
  border-radius:15px;
  border:1px solid rgba(255,255,255,0.1);
  box-shadow: 0 10px 30px rgba(0,0,0,0.3);
}

h2 {
  text-align:center;
  color:#FFD700;
  margin-bottom:20px;
}

input, select {
  width:100%;
  padding:10px;
  margin:8px 0;
  border-radius:8px;
  border:none;
  background: rgba(255,255,255,0.1);
  color:white;
  transition: all 0.2s ease;
  height:40px;
  font-size:15px;
  box-sizing:border-box;
}

select {
  padding-right:30px;
  appearance:none;
  background-image: url("data:image/svg+xml;charset=UTF-8,%3csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24' fill='none' stroke='white' stroke-width='2'%3e%3cpolyline points='6 9 12 15 18 9'%3e%3c/polyline%3e%3c/svg%3e");
  background-repeat:no-repeat;
  background-position:right 8px center;
  background-size:16px;
}

input::placeholder {
  color:#ccc;
}

/* 🔥 GLOW EFFECT */
input:focus, select:focus {
  outline:none;
  box-shadow: 0 0 10px #34a552, 0 0 5px #FFD700 inset;
  transform: scale(1.03);
}

button {
  padding:10px;
  margin:6px 0;
  cursor:pointer;
  border:none;
  border-radius:8px;
  height:38px;
  font-size:14px;
  font-weight:500;
}

.topBtn {
  width:32%;
  background:#222;
  color:white;
}

.copyBtn {
  width:49%;
  background:#51d789;
  color:white;
}

.resetBtn {
  width:49%;
  background:#ba8963;
  color:white;
}

.hide {
  display:none;
}
</style>
</head>

<body>

<div class="box">

<h2>Royal Enfield CRM</h2>

<button class="topBtn" onclick="setMode('default')">TRR / BRTL1 / INT2M</button>
<button class="topBtn" onclick="setMode('booked')">Booked</button>
<button class="topBtn" onclick="setMode('purchased')">Purchased</button>

<!-- DEFAULT -->
<div id="defaultSection">
<input id="keyEnquiry" placeholder="Key enquiry">
<input id="buyingTime" placeholder="Buying time">
<input id="testRide" placeholder="Test ride date and time / NA / Already taken">

<select id="model"></select>
<select id="color"><option>Select Color</option></select>

<input id="dealership" placeholder="Dealership">
<input id="altNumber" placeholder="Alternate Number">

<select id="paymentMode">
<option value="">Select Payment Mode</option>
<option>Cash</option>
<option>Finance</option>
<option>Both</option>
<option>Will decide later</option>
</select>
</div>

<!-- BOOKED -->
<div id="bookedSection" class="hide">
<input id="b_keyEnquiry" placeholder="Key enquiry">

<select id="b_model"></select>
<select id="b_color"><option>Select Color</option></select>

<input id="b_bookingtime" placeholder="Booking date">
<input id="b_dealership" placeholder="Dealership">
<input id="b_BookingName" placeholder="Booking Name">
<input id="b_bookingnumber" placeholder="Booking Number">
<input id="b_altNumber" placeholder="Alternate Number">

<select id="b_paymentMode">
<option value="">Select Payment Mode</option>
<option>Cash</option>
<option>Finance</option>
<option>Both</option>
<option>Will decide later</option>
</select>
</div>

<!-- PURCHASED -->
<div id="purchasedSection" class="hide">
<input id="p_keyEnquiry" placeholder="Key enquiry">

<select id="p_model"></select>
<select id="p_color"><option>Select Color</option></select>

<input id="p_Purchasedate" placeholder="Purchased date">
<input id="p_Registrationnumber" placeholder="Registration number">
<input id="p_dealership" placeholder="Dealership">
<input id="p_BookingName" placeholder="Booking Name">
<input id="p_bookingnumber" placeholder="Booking Number">
<input id="p_Chassisnumber" placeholder="Chassis number">
<input id="p_Enginenumber" placeholder="Engine number">
<input id="p_altNumber" placeholder="Alternate Number">

<select id="p_paymentMode">
<option value="">Select Payment Mode</option>
<option>Cash</option>
<option>Finance</option>
<option>Both</option>
<option>Will decide later</option>
</select>
</div>

<div style="display:flex; justify-content:space-between;">
<button class="copyBtn" onclick="copyData()">Copy</button>
<button class="resetBtn" onclick="resetForm()">Reset</button>
</div>

</div>

<script>

// 🔥 BIKE DATA (SAFE)
const bikeData = {
"Hunter 350": {"Tokyo Black":169804,"London Red":169804,"Rebel Blue":169804,"Moonshot White":169804,"Mumbai Yellow":169804,"Dapper Grey":165133,"Rio White":165133,"Graphite Gray":165133,"Tarmac Black":149900,"Factory Black":137640},
"Bullet 350": {"Black Gold":208012,"Standard Black":190312,"Standard Maroon":190312,"Battalion Black":166650,"Military Black":164423},
"Classic 350": {"Emerald":221393,"Stealth Black":216582,"Gun Grey":216582,"Commando Sand":207917,"Meddalion Bronze":196371,"Madras Red":192035,"Redditch Red":185854},
"Meteor 350": {"Supernova Black":219660,"Aurora Retro Green":209901,"Aurora Red":209901,"Stellar Marine Blue":206979,"Stellar Matt Grey":206979,"Fireball Orange":199189,"Fireball Grey":199189},
"Goan Classic 350": {"Rave Red":226489,"Trip Teal":226489,"Shack Black":223634,"Purple Haze":223634},
"Scram 440": {"Force Grey":230641,"Force Teal":230641,"Force Blue":230641,"Trail Blue":223131,"Trail Green":223131},
"Himalayan 450": {"Mana Black":337036,"Hanle Black":319682,"Kamet White":314319,"Slate Himalayan Salt":310028,"Slate Poppy Blue":310028,"Kaza Brown":305736},
"Guerrilla 450": {"Brava Blue":272479,"Shadow Ash":267116,"Peix Bronze":267116,"Smoke Silver":267116,"Apex Black":256387,"Apex Green":256387,"Apex Red":249194,"Twilight Blue":249194},
"Shotgun 650": {"Stencil White":413042,"Drill Green":409873,"Plasma Blue":409873,"Sheet metal Grey":398017},
"Interceptor 650": {"Mark 2":366390,"Black Ray":355322,"Barcelona Blue":355322,"Sunset Strip":344254,"Canyon Red":335394,"Cali Green":335394},
"Continental GT 650": {"Mr Clean":381885,"Slipstream Blue":375245,"Apex Grey":375245,"British Racing Green":353105,"Rocker Red":353105},
"Classic 650": {"Black Chrome":379252,"Teal":369655,"Bruntingthorpe Blue":364856,"Vallam Red":364856},
"Bear 650": {"Boardwalk White":375393,"Petrol Green":380933,"Wild Honey":380933,"Golden Shadow":388683,"White Two Four Nine":397538},
"Super Meteor 650": {"Celestial Red":436685,"Celestial Blue":436685,"Interstellar Green":419824,"Interstellar Grey":419824,"Astral Black":402965,"Astral Green":402965}
};

// 🔥 DROPDOWN
function fillDropdown(modelId, colorId){
let model = document.getElementById(modelId);
let color = document.getElementById(colorId);
if(!model || !color) return;

model.innerHTML = '<option value="">Select Model</option>';

Object.keys(bikeData).forEach(m=>{
let o=document.createElement("option");
o.value=m;
o.text=m;
model.appendChild(o);
});

model.onchange = null;

model.addEventListener("change",()=>{
color.innerHTML='<option>Select Color</option>';
if(!bikeData[model.value]) return;

Object.keys(bikeData[model.value]).forEach(c=>{
let o=document.createElement("option");
o.value=c;
o.text = `${c} - ₹${bikeData[model.value][c]}`;
color.appendChild(o);
});
});
}

// 🔥 INIT
document.addEventListener("DOMContentLoaded", () => {
fillDropdown("model","color");
fillDropdown("b_model","b_color");
fillDropdown("p_model","p_color");

// 🔥 ENTER → NEXT FIELD
document.addEventListener("keydown", function(e){
if(e.key === "Enter"){
let active = document.activeElement;
let section = active.closest("div");

if(!section) return;

let fields = section.querySelectorAll("input, select");
let index = Array.from(fields).indexOf(active);

if(index > -1 && index < fields.length - 1){
e.preventDefault();
fields[index + 1].focus();
}
}
});

});

// 🔥 MODE SWITCH
let currentMode="default";
function setMode(m){
currentMode=m;
document.getElementById("defaultSection").classList.add("hide");
document.getElementById("bookedSection").classList.add("hide");
document.getElementById("purchasedSection").classList.add("hide");
document.getElementById(m+"Section").classList.remove("hide");
}

// 🔥 COPY
function copyData(){
let text="";

if(currentMode==="default"){
text=[
keyEnquiry.value && `Key enquiry: ${keyEnquiry.value}`,
buyingTime.value && `Buying time: ${buyingTime.value}`,
testRide.value && `Test ride date and time: ${testRide.value}`,
model.value && `Model: ${model.value}`,
color.value && `Color: ${color.value}`,
altNumber.value && `Alternate number: ${altNumber.value}`,
paymentMode.value && `Payment mode: ${paymentMode.value}`
].filter(Boolean).join("\n");
}

if(currentMode==="booked"){
text=[
b_keyEnquiry.value && `Key enquiry: ${b_keyEnquiry.value}`,
b_model.value && `Model: ${b_model.value}`,
b_bookingtime.value && `Booking date: ${b_bookingtime.value}`,
b_BookingName.value && `Booking name: ${b_BookingName.value}`,
b_bookingnumber.value && `Booking number: ${b_bookingnumber.value}`,
b_altNumber.value && `Alternate number: ${b_altNumber.value}`,
b_paymentMode.value && `Payment mode: ${b_paymentMode.value}`
].filter(Boolean).join("\n");
}

if(currentMode==="purchased"){
text=[
p_keyEnquiry.value && `Key enquiry: ${p_keyEnquiry.value}`,
p_model.value && `Model: ${p_model.value}`,
p_Purchasedate.value && `Purchase date: ${p_Purchasedate.value}`,
p_Registrationnumber.value && `Registration number: ${p_Registrationnumber.value}`,
p_BookingName.value && `Booking name: ${p_BookingName.value}`,
p_bookingnumber.value && `Booking number: ${p_bookingnumber.value}`,
p_Chassisnumber.value && `Chassis number: ${p_Chassisnumber.value}`,
p_Enginenumber.value && `Engine number: ${p_Enginenumber.value}`,
p_altNumber.value && `Alternate number: ${p_altNumber.value}`,
p_paymentMode.value && `Payment mode: ${p_paymentMode.value}`
].filter(Boolean).join("\n");
}

navigator.clipboard.writeText(text);
alert("Copied ✅");
}

// 🔥 RESET
function resetForm(){
document.querySelectorAll("input").forEach(el=> el.value="");
document.querySelectorAll("select").forEach(sel=> sel.selectedIndex = 0);
document.querySelectorAll("select[id$='color']").forEach(c=>{
c.innerHTML='<option>Select Color</option>';
});
}

</script>

</body>
</html>
