<!DOCTYPE html>
<html>
<head>
<title>Royal Enfield CRM - Offline Ready</title>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body {
  margin:0;
  padding:20px;
  font-family: 'Segoe UI', sans-serif;
  background: linear-gradient(135deg, rgba(15,15,15,0.35), rgba(28,28,28,0.35), rgba(43,43,43,0.35)), url('himalayan-bg.jpg') center/cover fixed;
  background-attachment: fixed;
  min-height: 100vh;
  position: relative;
}

* {
  position: relative;
  z-index: 1;
}

.box {
  max-width:500px;
  margin:40px auto;
  padding:25px;
  background: rgba(255,255,255,0.04);
  backdrop-filter: blur(8px);
  border-radius:15px;
  border:1px solid rgba(255,255,255,0.1);
  box-shadow: 0 10px 30px rgba(0,0,0,0.3);
}

h2 {
  text-align:center;
  color:#FFD700;
  margin-bottom:20px;
}

input, select {
  width:100%;
  padding:10px;
  margin:8px 0;
  border-radius:8px;
  border:none;
  background: rgba(255,255,255,0.1);
  color:white;
  transition: all 0.2s ease;
  height:40px;
  font-size:15px;
  box-sizing:border-box;
}

select {
  padding-right:30px;
  appearance:none;
  background-image: url("data:image/svg+xml;charset=UTF-8,%3csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24' fill='none' stroke='white' stroke-width='2'%3e%3cpolyline points='6 9 12 15 18 9'%3e%3c/polyline%3e%3c/svg%3e");
  background-repeat:no-repeat;
  background-position:right 8px center;
  background-size:16px;
}

input::placeholder { color:#ccc; }

input:focus, select:focus {
  outline:none;
  box-shadow: 0 0 10px #34a552, 0 0 5px #FFD700 inset;
  transform: scale(1.03);
}

button {
  padding:10px;
  margin:6px 0;
  cursor:pointer;
  border:none;
  border-radius:8px;
  height:38px;
  font-size:14px;
  font-weight:500;
}

.topBtn  { width:32%; background:#222; color:white; }
.copyBtn { width:49%; background:#51d789; color:white; }
.resetBtn{ width:49%; background:#ba8963; color:white; }
.hide    { display:none; }

/* ── CUSTOM DROPDOWN ── */
.csw {
  position: relative;
  margin: 8px 0;
  z-index: 200;
}

.cst {
  width: 100%;
  height: 40px;
  padding: 0 36px 0 10px;
  background: rgba(255,255,255,0.1);
  border-radius: 8px;
  color: #ccc;
  font-size: 15px;
  cursor: pointer;
  display: flex;
  align-items: center;
  box-sizing: border-box;
  transition: box-shadow 0.2s, transform 0.2s;
  user-select: none;
}

.cst.has-value { color: white; }

.cst::after {
  content: '';
  position: absolute;
  right: 10px;
  top: 50%;
  transform: translateY(-50%);
  width: 16px;
  height: 16px;
  background-image: url("data:image/svg+xml;charset=UTF-8,%3csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24' fill='none' stroke='white' stroke-width='2'%3e%3cpolyline points='6 9 12 15 18 9'%3e%3c/polyline%3e%3c/svg%3e");
  background-repeat: no-repeat;
  background-size: 16px;
  transition: transform 0.2s;
}

.csw.open .cst::after { transform: translateY(-50%) rotate(180deg); }

.csw.open .cst,
.cst:focus {
  outline: none;
  box-shadow: 0 0 10px #34a552, 0 0 5px #FFD700 inset;
}

/* the list */
.cdrop {
  display: none;
  position: absolute;
  top: calc(100% + 4px);
  left: 0;
  width: 100%;
  background: #1c1c1c;
  border: 1px solid rgba(255,255,255,0.13);
  border-radius: 10px;
  max-height: 260px;
  overflow-y: auto;
  z-index: 9999;
  box-shadow: 0 8px 28px rgba(0,0,0,0.7);
  scrollbar-width: thin;
  scrollbar-color: #444 transparent;
}

.cdrop::-webkit-scrollbar { width: 5px; }
.cdrop::-webkit-scrollbar-thumb { background:#444; border-radius:4px; }

.csw.open .cdrop {
  display: block;
  animation: fadeDown 0.15s ease;
}

@keyframes fadeDown {
  from { opacity:0; transform:translateY(-6px); }
  to   { opacity:1; transform:translateY(0); }
}

/* each row */
.di {
  padding: 10px 14px;
  cursor: pointer;
  color: #ddd;
  font-size: 14px;
  font-weight: 500;
  display: flex;
  align-items: center;
  justify-content: space-between;
  border-bottom: 1px solid rgba(255,255,255,0.05);
  transition: background 0.12s;
}

.di:last-child { border-bottom: none; }
.di:hover { background: rgba(255,215,0,0.07); color: #FFD700; }

/* tooltip rendered by JS into #crm-tooltip */
#crm-tooltip {
  position: fixed;
  display: none;
  background: #111;
  border: 1px solid rgba(255,215,0,0.35);
  border-radius: 9px;
  padding: 11px 14px;
  min-width: 215px;
  max-width: 240px;
  box-shadow: 0 6px 20px rgba(0,0,0,0.75);
  z-index: 99999;
  pointer-events: none;
}

#crm-tooltip .tt-head {
  font-size: 13px;
  font-weight: 700;
  color: #FFD700;
  margin-bottom: 7px;
  padding-bottom: 6px;
  border-bottom: 1px solid rgba(255,215,0,0.2);
}

#crm-tooltip .tt-row {
  display: flex;
  justify-content: space-between;
  gap: 8px;
  margin: 4px 0;
}

#crm-tooltip .tt-lbl {
  font-size: 11px;
  color: #888;
  text-transform: uppercase;
  letter-spacing: 0.5px;
  white-space: nowrap;
}

#crm-tooltip .tt-val {
  font-size: 12px;
  color: #eee;
  text-align: right;
  line-height: 1.4;
}
/* ===== FLUID DESKTOP RESPONSIVE ===== */

body{
  padding:clamp(10px,2vw,20px);
}

/* CRM box auto adjusts */
.box{
  width:min(90vw,500px);
  padding:clamp(16px,2vw,25px);
  margin:auto;
  margin-top:clamp(20px,4vh,40px);
}

/* Title auto size */
h2{
  font-size:clamp(22px,2vw,30px);
}

/* Inputs + dropdowns */
input,
select{
  height:clamp(38px,4vw,42px);
  font-size:clamp(13px,1vw,15px);
}

/* Buttons auto resize */
button{
  font-size:clamp(12px,1vw,14px);
}

/* Top buttons */
.topBtn{
  width:32%;
  font-size:clamp(10px,1vw,14px);
  white-space:nowrap;
}

/* Copy reset */
.copyBtn,
.resetBtn{
  width:49%;
}

/* ===== CLOCK AUTO SCALE ===== */

.re-clock-wrap{
  top:clamp(10px,2vh,20px);
  right:clamp(10px,2vw,20px);
}

.re-clock-card{
  width:clamp(220px,22vw,320px);
  padding:clamp(12px,1.5vw,20px);
}

.flip-card{
  width:clamp(55px,5vw,88px);
  height:clamp(58px,6vw,90px);
}

.flip-card span{
  font-size:clamp(24px,2vw,40px);
}

.flip-separator{
  font-size:clamp(24px,2vw,40px);
}

.ampm-box{
  font-size:clamp(12px,1vw,18px);
  padding:
    clamp(6px,1vw,10px)
    clamp(8px,1vw,12px);
}

.calendar-panel{
  width:100%;
}

.calendar-grid div{
  height:clamp(24px,2vw,34px);
  font-size:clamp(11px,1vw,14px);
}

/* Smooth resizing */
.box,
.re-clock-card{
  transition:
  width .2s ease,
  padding .2s ease;
}
</style>
</head>
<body>

<!-- single shared tooltip node -->
<div id="crm-tooltip">
  <div class="tt-head" id="tt-name"></div>
  <div class="tt-row"><span class="tt-lbl">Engine</span><span class="tt-val" id="tt-usp"></span></div>
  <div class="tt-row"><span class="tt-lbl">Mileage</span><span class="tt-val" id="tt-mileage"></span></div>
</div>

<div class="box">

  <h2>Royal Enfield CRM</h2>

  <button class="topBtn" onclick="setMode('default')">TRR / BRTL1 / INT2M</button>
  <button class="topBtn" onclick="setMode('booked')">Booked</button>
  <button class="topBtn" onclick="setMode('purchased')">Purchased</button>

  <!-- DEFAULT — custom dropdown -->
  <div id="defaultSection">
    <input id="keyEnquiry" placeholder="Key enquiry">
    <input id="buyingTime" placeholder="Buying time">
    <input id="testRide"   placeholder="Test ride date and time / NA / Already taken">

    <div class="csw" id="wrap_model">
      <div class="cst" id="trig_model" tabindex="0">Select Model</div>
      <div class="cdrop" id="drop_model"></div>
    </div>
    <input type="hidden" id="model">

    <select id="color"><option>Select Color</option></select>
    <input id="dealership" placeholder="Dealership">
    <input id="altNumber"  placeholder="Alternate Number">
    <select id="paymentMode">
      <option value="">Select Payment Mode</option>
      <option>Cash</option><option>Finance</option><option>Both</option><option>Will decide later</option>
    </select>
  </div>

  <!-- BOOKED — normal select -->
  <div id="bookedSection" class="hide">
    <input id="b_keyEnquiry"   placeholder="Key enquiry">
    <select id="b_model"><option value="">Select Model</option></select>
    <select id="b_color"><option>Select Color</option></select>
    <input id="b_bookingtime"  placeholder="Booking date">
    <input id="b_dealership"   placeholder="Dealership">
    <input id="b_BookingName"  placeholder="Booking Name">
    <input id="b_bookingnumber" placeholder="Booking Number">
    <input id="b_altNumber"    placeholder="Alternate Number">
    <select id="b_paymentMode">
      <option value="">Select Payment Mode</option>
      <option>Cash</option><option>Finance</option><option>Both</option><option>Will decide later</option>
    </select>
  </div>

  <!-- PURCHASED — normal select -->
  <div id="purchasedSection" class="hide">
    <input id="p_keyEnquiry"         placeholder="Key enquiry">
    <select id="p_model"><option value="">Select Model</option></select>
    <select id="p_color"><option>Select Color</option></select>
    <input id="p_Purchasedate"        placeholder="Purchased date">
    <input id="p_Registrationnumber"  placeholder="Registration number">
    <input id="p_dealership"          placeholder="Dealership">
    <input id="p_BookingName"         placeholder="Booking Name">
    <input id="p_bookingnumber"       placeholder="Booking Number">
    <input id="p_Chassisnumber"       placeholder="Chassis number">
    <input id="p_Enginenumber"        placeholder="Engine number">
    <input id="p_altNumber"           placeholder="Alternate Number">
    <select id="p_paymentMode">
      <option value="">Select Payment Mode</option>
      <option>Cash</option><option>Finance</option><option>Both</option><option>Will decide later</option>
    </select>
  </div>

  <div style="display:flex; justify-content:space-between;">
    <button class="copyBtn"  onclick="copyData()">Copy</button>
    <button class="resetBtn" onclick="resetForm()">Reset</button>
  </div>

</div>

<script>
const bikeData = {
  "Hunter 350":        {"Tokyo Black":169804,"London Red":169804,"Rebel Blue":169804,"Moonshot White":169804,"Mumbai Yellow":169804,"Dapper Grey":165133,"Rio White":165133,"Graphite Gray":165133,"Tarmac Black":149900,"Factory Black":137640},
  "Bullet 350":        {"Black Gold":208012,"Standard Black":190312,"Standard Maroon":190312,"Battalion Black":166650,"Military Black":164423},
  "Classic 350":       {"Emerald":221393,"Stealth Black":216582,"Gun Grey":216582,"Commando Sand":207917,"Meddalion Bronze":196371,"Madras Red":192035,"Redditch Red":185854},
  "Meteor 350":        {"Supernova Black":219660,"Aurora Retro Green":209901,"Aurora Red":209901,"Stellar Marine Blue":206979,"Stellar Matt Grey":206979,"Fireball Orange":199189,"Fireball Grey":199189},
  "Goan Classic 350":  {"Rave Red":226489,"Trip Teal":226489,"Shack Black":223634,"Purple Haze":223634},
  "Scram 440":         {"Force Grey":230641,"Force Teal":230641,"Force Blue":230641,"Trail Blue":223131,"Trail Green":223131},
  "Himalayan 450":     {"Mana Black":337036,"Hanle Black":319682,"Kamet White":314319,"Slate Himalayan Salt":310028,"Slate Poppy Blue":310028,"Kaza Brown":305736},
  "Guerrilla 450":     {"Brava Blue":272479,"Shadow Ash":267116,"Peix Bronze":267116,"Smoke Silver":267116,"Apex Black":256387,"Apex Green":256387,"Apex Red":249194,"Twilight Blue":249194},
  "Shotgun 650":       {"Stencil White":413042,"Drill Green":409873,"Plasma Blue":409873,"Sheet metal Grey":398017},
  "Interceptor 650":   {"Mark 2":366390,"Black Ray":355322,"Barcelona Blue":355322,"Sunset Strip":344254,"Canyon Red":335394,"Cali Green":335394},
  "Continental GT 650":{"Mr Clean":381885,"Slipstream Blue":375245,"Apex Grey":375245,"British Racing Green":353105,"Rocker Red":353105},
  "Classic 650":       {"Black Chrome":379252,"Teal":369655,"Bruntingthorpe Blue":364856,"Vallam Red":364856},
  "Bear 650":          {"Boardwalk White":375393,"Petrol Green":380933,"Wild Honey":380933,"Golden Shadow":388683,"White Two Four Nine":397538},
  "Super Meteor 650":  {"Celestial Red":436685,"Celestial Blue":436685,"Interstellar Green":419824,"Interstellar Grey":419824,"Astral Black":402965,"Astral Green":402965}
};

const bikeInfo = {
  "Hunter 350":        { usp:"349cc, single-cylinder, air cooled engine", mileage:"36.2 KM/L" },
  "Bullet 350":        { usp:"349cc, single-cylinder, air cooled engine", mileage:"37 KM/L" },
  "Classic 350":       { usp:"349cc, single-cylinder, air cooled engine", mileage:"41.5 KM/L" },
  "Meteor 350":        { usp:"349cc, single-cylinder, air cooled engine", mileage:"41.9 KM/L" },
  "Goan Classic 350":  { usp:"349cc, single-cylinder, air cooled engine", mileage:"36.2 KM/L" },
  "Scram 440":         { usp:"452cc Single Cylinder / Air oiled cooled engine", mileage:"29.5 KM/L" },
  "Himalayan 450":     { usp:"452cc Single Cylinder / Air oil cooled engine", mileage:"30 KM/L" },
  "Guerrilla 450":     { usp:"452cc Single Cylinder / Air oil cooled engine", mileage:"29.5 KM/L" },
  "Interceptor 650":   { usp:"648cc Inline Twin / Air Oil Cooled Engine", mileage:"25 KM/L" },
  "Continental GT 650":{ usp:"648cc Inline Twin / Air Oil Cooled Engine", mileage:"27 KM/L" },
  "Super Meteor 650":  { usp:"648cc parallel Twin / Air Oil Cooled Engine", mileage:"25 KM/L" },
  "Shotgun 650":       { usp:"648cc parallel Twin / Air Oil Cooled Engine", mileage:"22 KM/L" },
  "Bear 650":          { usp:"648cc Inline Twin / Air Oil Cooled Engine", mileage:"22 KM/L" },
  "Classic 650":       { usp:"648cc Inline Twin / Air Oil Cooled Engine", mileage:"21.45 KM/L" }
};

/* ── tooltip node ── */
const tooltip   = document.getElementById('crm-tooltip');
const ttName    = document.getElementById('tt-name');
const ttUsp     = document.getElementById('tt-usp');
const ttMileage = document.getElementById('tt-mileage');

function showTooltip(e, modelName) {
  const info = bikeInfo[modelName] || {};
  ttName.textContent    = modelName;
  ttUsp.textContent     = info.usp     || '—';
  ttMileage.textContent = info.mileage || '—';
  positionTooltip(e);
  tooltip.style.display = 'block';
}

function positionTooltip(e) {
  const TW = tooltip.offsetWidth  || 230;
  const TH = tooltip.offsetHeight || 80;
  const vw = window.innerWidth;
  const vh = window.innerHeight;
  let x = e.clientX + 14;
  let y = e.clientY - TH / 2;
  if (x + TW > vw - 8) x = e.clientX - TW - 14;
  if (y < 8)           y = 8;
  if (y + TH > vh - 8) y = vh - TH - 8;
  tooltip.style.left = x + 'px';
  tooltip.style.top  = y + 'px';
}

function hideTooltip() {
  tooltip.style.display = 'none';
}

/* ── build custom dropdown (default section only) ── */
function buildCustomDropdown() {
  const wrapper  = document.getElementById('wrap_model');
  const trigger  = document.getElementById('trig_model');
  const drop     = document.getElementById('drop_model');
  const hidden   = document.getElementById('model');
  const colorSel = document.getElementById('color');

  Object.keys(bikeData).forEach(name => {
    const item = document.createElement('div');
    item.className = 'di';
    item.textContent = name;
    item.dataset.model = name;

    item.addEventListener('mouseenter', e => showTooltip(e, name));
    item.addEventListener('mousemove',  e => positionTooltip(e));
    item.addEventListener('mouseleave', hideTooltip);

    item.addEventListener('click', () => {
      hidden.value = name;
      trigger.textContent = name;
      trigger.classList.add('has-value');
      wrapper.classList.remove('open');
      hideTooltip();
      populateColor(colorSel, name);
    });

    drop.appendChild(item);
  });

  trigger.addEventListener('click', e => {
    e.stopPropagation();
    const wasOpen = wrapper.classList.contains('open');
    closeAllDropdowns();
    if (!wasOpen) wrapper.classList.add('open');
  });

  trigger.addEventListener('keydown', e => {
    if (e.key === 'Enter' || e.key === ' ') { e.preventDefault(); trigger.click(); }
  });
}

function closeAllDropdowns() {
  document.querySelectorAll('.csw.open').forEach(w => w.classList.remove('open'));
  hideTooltip();
}

document.addEventListener('click', closeAllDropdowns);

/* ── populate normal selects (booked & purchased) ── */
function fillNormalSelect(modelSelId, colorSelId) {
  const modelSel = document.getElementById(modelSelId);
  const colorSel = document.getElementById(colorSelId);
  modelSel.innerHTML = '<option value="">Select Model</option>';
  Object.keys(bikeData).forEach(name => {
    const o = document.createElement('option');
    o.value = o.text = name;
    modelSel.appendChild(o);
  });
  modelSel.addEventListener('change', () => populateColor(colorSel, modelSel.value));
}

function populateColor(colorSel, modelName) {
  colorSel.innerHTML = '<option>Select Color</option>';
  if (!bikeData[modelName]) return;
  Object.keys(bikeData[modelName]).forEach(c => {
    const o = document.createElement('option');
    o.value = c;
    o.text  = `${c} - ₹${bikeData[modelName][c]}`;
    colorSel.appendChild(o);
  });
}

/* ── init ── */
document.addEventListener('DOMContentLoaded', () => {
  buildCustomDropdown();
  fillNormalSelect('b_model', 'b_color');
  fillNormalSelect('p_model', 'p_color');

  document.addEventListener('keydown', e => {
    if (e.key === 'Enter') {
      const active  = document.activeElement;
      const section = active.closest('div');
      if (!section) return;
      const fields = section.querySelectorAll('input:not([type=hidden]), select, .cst');
      const idx    = Array.from(fields).indexOf(active);
      if (idx > -1 && idx < fields.length - 1) { e.preventDefault(); fields[idx+1].focus(); }
    }
  });
});

/* ── mode switch ── */
let currentMode = 'default';
function setMode(m) {
  currentMode = m;
  ['default','booked','purchased'].forEach(s =>
    document.getElementById(s+'Section').classList.add('hide'));
  document.getElementById(m+'Section').classList.remove('hide');
  closeAllDropdowns();
}

/* ── copy ── */
function copyData() {
  let text = '';
  if (currentMode === 'default') {
    text = [
      keyEnquiry.value  && `Key enquiry: ${keyEnquiry.value}`,
      buyingTime.value  && `Buying time: ${buyingTime.value}`,
      testRide.value    && `Test ride date and time: ${testRide.value}`,
      model.value       && `Model: ${model.value}`,
      color.value && color.value !== 'Select Color' && `Color: ${color.value}`,
      altNumber.value   && `Alternate number: ${altNumber.value}`,
      paymentMode.value && `Payment mode: ${paymentMode.value}`
    ].filter(Boolean).join('\n');
  }
  if (currentMode === 'booked') {
    text = [
      b_keyEnquiry.value    && `Key enquiry: ${b_keyEnquiry.value}`,
      b_model.value         && `Model: ${b_model.value}`,
      b_bookingtime.value   && `Booking date: ${b_bookingtime.value}`,
      b_dealership.value    && `Dealership: ${b_dealership.value}`,
      b_BookingName.value   && `Booking name: ${b_BookingName.value}`,
      b_bookingnumber.value && `Booking number: ${b_bookingnumber.value}`,
      b_altNumber.value     && `Alternate number: ${b_altNumber.value}`,
      b_paymentMode.value   && `Payment mode: ${b_paymentMode.value}`
    ].filter(Boolean).join('\n');
  }
  if (currentMode === 'purchased') {
    text = [
      p_keyEnquiry.value         && `Key enquiry: ${p_keyEnquiry.value}`,
      p_model.value              && `Model: ${p_model.value}`,
      p_Purchasedate.value       && `Purchase date: ${p_Purchasedate.value}`,
      p_Registrationnumber.value && `Registration number: ${p_Registrationnumber.value}`,
      p_dealership.value         && `Dealership: ${p_dealership.value}`,
      p_BookingName.value        && `Booking name: ${p_BookingName.value}`,
      p_bookingnumber.value      && `Booking number: ${p_bookingnumber.value}`,
      p_Chassisnumber.value      && `Chassis number: ${p_Chassisnumber.value}`,
      p_Enginenumber.value       && `Engine number: ${p_Enginenumber.value}`,
      p_altNumber.value          && `Alternate number: ${p_altNumber.value}`,
      p_paymentMode.value        && `Payment mode: ${p_paymentMode.value}`
    ].filter(Boolean).join('\n');
  }
  navigator.clipboard.writeText(text);
  alert('Copied ✅');
}

/* ── reset ── */
function resetForm() {

  const confirmReset = confirm(
    '⚠️ Are you sure?\n\nAll entered data will be cleared.'
  );

  if (!confirmReset) return;

  document
  .querySelectorAll(
    'input:not([type=hidden])'
  )
  .forEach(el => el.value = '');

  document
  .querySelectorAll(
    'input[type=hidden]'
  )
  .forEach(el => el.value = '');

  document
  .querySelectorAll('select')
  .forEach(sel => sel.selectedIndex = 0);

  document
  .querySelectorAll(
    'select[id$="color"]'
  )
  .forEach(c =>
    c.innerHTML =
    '<option>Select Color</option>'
  );

  const trig =
  document.getElementById(
    'trig_model'
  );

  trig.textContent =
  'Select Model';

  trig.classList.remove(
    'has-value'
  );

  closeAllDropdowns();
}
</script>
</body>
</html>
